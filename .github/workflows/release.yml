name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (renderer + main + package portable exe)
        run: npm run build:win

      - name: Zip portable exe (renamed to 記事本.exe) + 請點我.txt
        # CRITICAL: only zip the portable artifact at release/ top level.
        # electron-builder also drops release/win-unpacked/Noteqad.exe which
        # DOESN'T work standalone (it's the unpacked layout that needs all
        # the surrounding *.dll / locales / resources to run). An earlier
        # `-Recurse` version was zipping that broken exe too, uploading both
        # to the GitHub Release, and users grabbed the short-named
        # "Noteqad.zip" → got "找不到 ffmpeg.dll" on launch.
        #
        # Also bundles resources/請點我.txt at the zip root so the user gets
        # plain-Chinese onboarding (SmartScreen instructions, password reset,
        # quick-start) the moment they unzip — see CLAUDE.md item 13.
        #
        # Rename inside the zip: electron-builder still emits the build
        # artifact as ${productName}-${version}-win-portable.exe (= ASCII,
        # = Noteqad-X.Y.Z-win-portable.exe) — keeping productName=Noteqad
        # protects %APPDATA%/Noteqad/ as the userData root that the v0.6.2
        # migration assumes. But for the user's release zip we Copy-Item the
        # built exe to 記事本.exe inside release/, so the file the end user
        # double-clicks after unzipping looks like a real Notepad. Zip
        # filename stays Noteqad-...-win-portable.zip so the upload glob
        # below still matches.
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path release -Filter "*-win-portable.exe" -File
          if (-not $portable) {
            Write-Error "Portable exe not found under release/ (top level)"
            exit 1
          }
          $readme = "resources\請點我.txt"
          if (-not (Test-Path $readme)) {
            Write-Error "Missing resources/請點我.txt"
            exit 1
          }
          $displayExe = "release\記事本.exe"
          foreach ($exe in $portable) {
            Copy-Item -Path $exe.FullName -Destination $displayExe -Force
            $dest = "release\$($exe.BaseName).zip"
            Compress-Archive -Path @($displayExe, $readme) -DestinationPath $dest -Force
            Write-Host "Zipped: $dest (contains 記事本.exe + 請點我.txt)"
          }

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          # Only the portable zip — never the win-unpacked exe.
          files: release/*-win-portable.zip
          generate_release_notes: true
