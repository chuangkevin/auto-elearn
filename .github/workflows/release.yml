name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (renderer + main + package portable exe)
        run: npm run build:win

      - name: Zip portable exe
        shell: pwsh
        run: |
          Get-ChildItem -Path release -Filter "*.exe" -Recurse | ForEach-Object {
            $dest = "release\$($_.BaseName).zip"
            Compress-Archive -Path $_.FullName -DestinationPath $dest -Force
            Write-Host "Zipped: $dest"
          }

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
