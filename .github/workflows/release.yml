name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (renderer + main + package portable exe)
        run: npm run build:win

      - name: Zip portable exe
        # CRITICAL: only zip the portable artifact at release/ top level.
        # electron-builder also drops release/win-unpacked/auto-elearn.exe
        # which DOESN'T work standalone (it's the unpacked layout that
        # needs all the surrounding *.dll / locales / resources to run).
        # An earlier `-Recurse` version was zipping that broken exe too,
        # uploading both to the GitHub Release, and users grabbed the
        # short-named "auto-elearn.zip" → got "找不到 ffmpeg.dll" on launch.
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path release -Filter "*-win-portable.exe" -File
          if (-not $portable) {
            Write-Error "Portable exe not found under release/ (top level)"
            exit 1
          }
          foreach ($exe in $portable) {
            $dest = "release\$($exe.BaseName).zip"
            Compress-Archive -Path $exe.FullName -DestinationPath $dest -Force
            Write-Host "Zipped: $dest"
          }

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          # Only the portable zip — never the win-unpacked exe.
          files: release/*-win-portable.zip
          generate_release_notes: true
