appId: tw.kevin.auto-elearn
# productName = .exe filename + window display name. Disguise: "Noteqad" looks
# enough like "Notepad" at a glance that a glance at the taskbar/Alt-Tab list
# doesn't blow cover. The real app code still runs underneath.
productName: Noteqad
directories:
  output: release
  buildResources: buildResources
files:
  - out/**/*
  - resources/**/*
  - package.json
  # NOTE: do NOT blanket-exclude node_modules — electron-builder needs production
  # dependencies (undici, better-sqlite3, @electron-toolkit/utils, etc.) bundled.
  # electron-builder's default rules already exclude dev-only junk.
asarUnpack:
  # Native .node bindings must live on disk, not inside app.asar, so they can be dlopen'd.
  - resources/**/*
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/file-uri-to-path/**/*"
win:
  icon: resources/icon.ico
  # portable = single-file standalone .exe; no installer / no Start menu shortcut
  # leaves a Windows fingerprint. The release workflow zips this exe as-is +
  # a 「請點我.txt」 readme into the published GitHub Release zip.
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: ${productName}-${version}-win-portable.${ext}
