appId: tw.kevin.auto-elearn
# Product name = output .exe / installer name. Using "Noteqad" matches the on-screen
# Notepad disguise (stealth mode); the app still runs auto-elearn code underneath.
productName: Noteqad
directories:
  output: release
  buildResources: buildResources
files:
  - out/**/*
  - resources/**/*
  - package.json
  - "!node_modules/**/*"
asarUnpack:
  - resources/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
